<!-- Stat Card Component - KPI card for displaying metrics -->
<!-- Usage: Include multiple stat cards for dashboard KPI sections -->
<div class="stat-card">
  <div class="stat-icon">
    <i class="{{icon}}"></i>
  </div>
  <div class="stat-content">
    <div class="stat-label">{{label}}</div>
    <div class="stat-value">{{value}}</div>
    {{trend}}
  </div>
</div>
