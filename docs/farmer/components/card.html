<!-- Card Component - Reusable content card for dashboard pages -->
<!-- Usage: Include this in page and repeat for each card needed -->
<!-- The content between the tags will be placed inside the card body -->
<div class="dashboard-card">
  <div class="dashboard-card-header">
    <h4>{{title}}</h4>
    {{badge}}
  </div>
  <div class="dashboard-card-body">
    {{content}}
  </div>
  {{footer}}
</div>
